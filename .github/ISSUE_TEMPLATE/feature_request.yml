name: Feature request
description: Suggest a new command, flag, or behavior.
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        The command surface lives in [`cli.ocs.yaml`](../../cli.ocs.yaml).
        If your request adds or changes a subcommand, flag, or exit code,
        please describe it in those terms so it can map cleanly to the spec.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the CLI does not currently support well?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        Sketch the command shape, flags, output, and exit codes. Example:

        ```
        eprospera application export <id> --format pdf --out ./<id>.pdf
        # exits 0 on success, 5 if the application is not found
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other commands, flags, or workflows you considered and why they fall short.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Area
      description: Which part of the CLI does this touch?
      multiple: true
      options:
        - entity
        - application
        - me
        - auth
        - config
        - completion
        - schema
        - output / formatting
        - credentials / scopes
        - other
    validations:
      required: true

  - type: textarea
    id: agent-impact
    attributes:
      label: Agent / automation impact
      description: |
        This CLI is designed to be consumed by scripts and agents.
        Does this proposal change JSON output shape, exit codes, or the OCS
        spec in a way that affects automated consumers?
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional context
    validations:
      required: false
