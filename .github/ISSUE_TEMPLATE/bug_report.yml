name: Bug report
description: Report a defect in the CLI.
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please redact any API keys,
        bearer tokens, or personal data from logs and command output before
        submitting. For security issues, do **not** use this form — see
        [SECURITY.md](../../SECURITY.md).

  - type: input
    id: version
    attributes:
      label: CLI version
      description: Output of `eprospera --version`.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v22.13.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: dropdown
    id: env
    attributes:
      label: API environment
      description: Which e-Prospera environment were you targeting?
      options:
        - production (default)
        - staging (EPROSPERA_ENV=staging)
        - custom EPROSPERA_BASE_URL
        - not applicable
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command run
      description: The exact `eprospera ...` invocation. Redact secrets.
      render: shell
      placeholder: "eprospera application get app_123 --json"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include stderr output, the exit code, and any error envelope from stdout (with secrets redacted).
      render: shell
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Numbered steps to reproduce the issue from a clean install.
      placeholder: |
        1. `pnpm install -g @prospera/eprospera-cli`
        2. `eprospera auth login`
        3. `eprospera application get app_123`
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else — screenshots, related issues, suspected root cause.
    validations:
      required: false

  - type: checkboxes
    id: hygiene
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have redacted API keys, bearer tokens, and personal data from all logs and command output.
          required: true
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
