name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Publish package
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.package-version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing
        run: npm install --global npm@^11.10.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate checked artifacts
        run: pnpm run gen:all

      - name: Verify generated files are current
        run: git diff --exit-code

      - name: Validate OpenCLI document
        run: pnpm run validate:ocs

      - name: Check formatting and types
        run: pnpm run check

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm run build

      - name: Build bundled executable
        run: pnpm run bundle

      - name: Check npm package contents
        run: npm pack --dry-run --json --ignore-scripts

      - name: Smoke test packed install
        run: pnpm run pack:smoke

      - name: Check release PR token
        id: release-pr-token
        shell: bash
        env:
          CHANGESETS_GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
        run: |
          if [ -n "${CHANGESETS_GITHUB_TOKEN}" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Detect pending changesets
        id: pending-changesets
        shell: bash
        run: |
          shopt -s nullglob
          has_changesets=false
          for changeset in .changeset/*.md; do
            if [ "$(basename "${changeset}")" != "README.md" ]; then
              has_changesets=true
              break
            fi
          done
          echo "present=${has_changesets}" >> "${GITHUB_OUTPUT}"

      - name: Version or publish with Changesets
        id: changesets
        if: >
          steps.pending-changesets.outputs.present != 'true' ||
          steps.release-pr-token.outputs.available == 'true'
        uses: changesets/action@v1
        with:
          version: pnpm run version:changesets
          publish: pnpm changeset publish
          createGithubReleases: true
          github-token: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update Changesets release branch
        if: >
          steps.pending-changesets.outputs.present == 'true' &&
          steps.release-pr-token.outputs.available != 'true'
        shell: bash
        env:
          RELEASE_BRANCH: changeset-release/main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${RELEASE_BRANCH}"
          git reset --hard "${GITHUB_SHA}"
          pnpm run version:changesets
          pnpm run gen:all
          if [ -z "$(git status --porcelain)" ]; then
            echo "No version changes were generated."
            exit 0
          fi
          git add .
          git commit --no-verify -m "Version Packages"
          git push origin "HEAD:${RELEASE_BRANCH}" --force
          {
            echo "### Changesets release branch updated"
            echo
            echo "GitHub Actions cannot create pull requests under the current organization policy."
            echo "Open a pull request from \`${RELEASE_BRANCH}\` into \`${GITHUB_REF_NAME}\` to continue the release."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Read published package version
        id: package-version
        if: steps.changesets.outputs.published == 'true'
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  binaries:
    name: Build release bundle (${{ matrix.asset }})
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: eprospera-linux-x64.mjs
          - os: macos-latest
            asset: eprospera-macos-x64.mjs
          - os: windows-latest
            asset: eprospera-windows-x64.mjs

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bundled executable
        run: pnpm run bundle

      - name: Stage release bundle
        shell: bash
        run: |
          mkdir -p release-binaries
          cp dist/bundle/eprospera.mjs "release-binaries/${{ matrix.asset }}"
          chmod +x "release-binaries/${{ matrix.asset }}"

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-${{ matrix.asset }}
          path: release-binaries/${{ matrix.asset }}
          if-no-files-found: error

  attach-binaries:
    name: Attach release bundles
    needs:
      - release
      - binaries
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download release bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-binary-*
          path: release-binaries
          merge-multiple: true

      - name: Attach bundles to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: "v${{ needs.release.outputs.version }}"
        run: |
          release_found=false
          for attempt in 1 2 3 4 5 6; do
            if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
              release_found=true
              break
            fi
            sleep 5
          done
          if [ "${release_found}" != "true" ]; then
            gh release view "${RELEASE_TAG}"
          fi
          gh release upload "${RELEASE_TAG}" release-binaries/* --clobber
