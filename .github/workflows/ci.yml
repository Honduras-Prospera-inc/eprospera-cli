name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - 22.x
          - 24.x

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate checked artifacts
        run: pnpm run gen:all

      - name: Verify generated files are current
        run: git diff --exit-code

      - name: Validate OpenCLI document
        run: pnpm run validate:ocs

      - name: Check formatting and types
        run: pnpm run check

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm run build

      - name: Build bundled executable
        run: pnpm run bundle

      - name: Check npm package contents
        run: npm pack --dry-run --json --ignore-scripts

      - name: Smoke test packed install
        run: pnpm run pack:smoke
